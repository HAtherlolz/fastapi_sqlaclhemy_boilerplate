version: "3.8"

services:
  app:
    build: .
    container_name: app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build: .
    container_name: migrations
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

volumes:
  postgres_data: